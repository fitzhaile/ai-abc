# Publishes the static dashboard to GitHub Pages.
#
# What it does, in plain English: on every push to main that touches the
# dashboard (or this workflow), it takes the already-built dashboard/ folder
# — index.html plus the committed data.js/data.json — and serves that folder
# as the site root. No build step: the site is pre-built and committed, exactly
# like the Render setup in render.yaml. Because dashboard/ becomes the site
# root, index.html's relative <script src="data.js"> resolves correctly.
#
# Prerequisites (one-time, in repo Settings → Pages):
#   - Set "Source" to "GitHub Actions".
#   - Pages on a PRIVATE repo requires a paid GitHub plan (Pro or higher);
#     on the free plan the repo must be public or this deploy step will fail
#     with a permissions/plan error.
#
# To publish refreshed data: re-run the pipeline locally, commit the
# regenerated dashboard/data.js + data.json, and push — this workflow redeploys.

name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:        # allow manual redeploys from the Actions tab

# Least-privilege token: read the repo, write Pages, mint the OIDC token
# that deploy-pages uses to authenticate the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the dashboard/ folder as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard      # serve this folder as the site root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
